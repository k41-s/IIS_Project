syntax = "proto3";
package weather;

option java_package = "hr.algebra.iis_client_app.weather";
option java_outer_classname = "WeatherProto";

service WeatherService {
  rpc GetTemperature (WeatherRequest) returns (WeatherResponse);
}

message WeatherRequest {
  string city_name = 1;
}

message WeatherResponse {
  repeated CityWeather results = 1;
}

message CityWeather {
  string city_name = 1;
  string temp = 2;
}
